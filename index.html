    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-area {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .input-area:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-value.pass {
            color: #22c55e;
        }

        .stat-value.fail {

        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result {
            margin-top: 24px;
        }

        .result-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-item.pass {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .result-item.fail {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .result-item .icon {

            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .result-item.pass .icon {
            background: #22c55e;
            color: white;
        }

        .result-item.fail .icon {
            background: #ef4444;
            color: white;
        }

        .result-item .book-name {

            word-break: break-all;
        }

        .result-item .source {
            font-size: 12px;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .category-tags {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .category-tag {

            padding: 40px;

        // 清理书名中的特殊字符用于匹配
        function normalizeBookName(name) {
            return name.replace(/[""''""'']/g, '').trim().toLowerCase();
        }

        // 模糊匹配函数
        function fuzzyMatch(text, book) {
            const normalizedText = normalizeBookName(text);
            const normalizedBook = normalizeBookName(book.name);

            // 完全包含
            if (normalizedText.includes(normalizedBook) || normalizedBook.includes(normalizedText)) {
                return true;
            }

            // 检查核心关键词（去掉括号内容）
            const coreText = normalizedText.replace(/\([^)]*\)/g, '').trim();
            const coreBook = normalizedBook.replace(/\([^)]*\)/g, '').trim();

            if (coreText.includes(coreBook) || coreBook.includes(coreText)) {
                return true;
            }

            // 关键词匹配（针对红楼梦等系列）
            const keywords = normalizedBook.split(/[,，、:：]/).filter(k => k.length >= 4);
            for (const keyword of keywords) {
                if (normalizedText.includes(keyword)) {
                    return true;
                }
            }

            return false;
        }

        // 获取分类标签的CSS类名
        function getCategoryClass(category) {
            if (category === '永久免费') return 'permanent';
            if (category === '新人限免-365') return 'new-365';
            if (category === '新人限免-元气') return 'new-yuanqi';
            if (category === '新人限免-非凡') return 'new-feifan';
            if (category === '免费专区') return 'free-zone';
            return '';
        }

        function checkBooks() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');
            const statsDiv = document.getElementById('stats');

            if (!inputText.trim()) {
                resultDiv.innerHTML = '<div class="no-result">请输入要核验的内容</div>';
                statsDiv.style.display = 'none';
                return;
            }

            // 提取可能的书名（按换行、逗号、分号等分隔）
            const lines = inputText.split(/[\n\r,，;；、.。!！?？]+/).map(s => s.trim()).filter(s => s.length >= 2);

            // 去重
            const uniqueTexts = [...new Set(lines)];

            let passCount = 0;
            let failCount = 0;
            const results = [];

            for (const text of uniqueTexts) {
                let found = false;
                let matchedBook = null;

                for (const book of books) {
                    if (fuzzyMatch(text, book)) {
                        found = true;
                        matchedBook = book;
                        break;
                    }
                }

                if (found) {
                    passCount++;
                    results.push({ text, matchedBook, pass: true });
                } else {
                    failCount++;
                    results.push({ text, matchedBook, pass: false });
                }
            }

            // 显示统计
            document.getElementById('passCount').textContent = passCount;
            document.getElementById('failCount').textContent = failCount;
            statsDiv.style.display = 'flex';

            // 显示结果
            resultDiv.innerHTML = results.map(r => {
                const categoriesHtml = r.matchedBook && r.matchedBook.categories
                    ? r.matchedBook.categories.map(cat => `<span class="category-tag ${getCategoryClass(cat)}">${cat}</span>`).join('')
                    : '';
                return `
                <div class="result-item ${r.pass ? 'pass' : 'fail'}">
                    <span class="icon">${r.pass ? '✓' : '✗'}</span>
                    <div style="flex:1">
                        <span class="book-name">${r.text}</span>
                        ${r.pass && categoriesHtml ? `<div class="category-tags">${categoriesHtml}</div>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;

            const extension = file.name.split('.').pop().toLowerCase();
            let text = '';

            try {
                if (extension === 'txt' || extension === 'csv') {
                    text = await file.text();
                } else if (extension === 'xlsx' || extension === 'xls') {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data);
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    text = jsonData.flat().filter(cell => cell !== null && cell !== undefined).join('\n');
                }

                const existingText = document.getElementById('inputText').value;
                if (existingText.trim()) {
                    document.getElementById('inputText').value = existingText + '\n' + text;
                } else {
                    document.getElementById('inputText').value = text;
                }
            } catch (error) {
                alert('文件读取失败：' + error.message);
            }
        }
