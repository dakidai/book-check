<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍核验工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-area {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .input-area:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-value.pass {
            color: #22c55e;
        }

        .stat-value.fail {
            color: #ef4444;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result {
            margin-top: 24px;
        }

        .result-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-item.pass {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .result-item.fail {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .result-item .icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .result-item.pass .icon {
            background: #22c55e;
            color: white;
        }

        .result-item.fail .icon {
            background: #ef4444;
            color: white;
        }

        .result-item .book-name {
            flex: 1;
            word-break: break-all;
        }

        .result-item .source {
            font-size: 12px;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .no-result {
            text-align: center;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📚 书籍核验工具</h1>
            <p class="subtitle">粘贴全部书名，自动识别书籍是否在限免池中（支持模糊匹配）<br>非限免池书籍需求请走【特殊审批】</p>

            <textarea class="input-area" id="inputText" placeholder="粘贴书单内容..."></textarea>
            <button class="btn" onclick="checkBooks()">核验书籍</button>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat">
                    <div class="stat-value pass" id="passCount">0</div>
                    <div class="stat-label">在限免池</div>
                </div>
                <div class="stat">
                    <div class="stat-value fail" id="failCount">0</div>
                    <div class="stat-label">不在限免池</div>
                </div>
            </div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>

            "贫穷的本质",
            "红楼梦第四集",
            "刘邦",
            "你要的是幸福，还是对错",
            "销售就是要玩转情商",
            "知识大迁移",
            "贪婪的多巴胺",
            "终身成长",
            "人体简史",
            "万古江河"
        ];

        // 清理书名中的特殊字符用于匹配
        function normalizeBookName(name) {
            return name.replace(/[""''""'']/g, '').trim().toLowerCase();
        }

        // 模糊匹配函数
        function fuzzyMatch(text, bookName) {
            const normalizedText = normalizeBookName(text);
            const normalizedBook = normalizeBookName(bookName);

            // 完全包含
            if (normalizedText.includes(normalizedBook) || normalizedBook.includes(normalizedText)) {
                return true;
            }

            // 检查核心关键词（去掉括号内容）
            const coreText = normalizedText.replace(/\([^)]*\)/g, '').trim();
            const coreBook = normalizedBook.replace(/\([^)]*\)/g, '').trim();

            if (coreText.includes(coreBook) || coreBook.includes(coreText)) {
                return true;
            }

            // 关键词匹配（针对红楼梦等系列）
            const keywords = normalizedBook.split(/[,，、:：]/).filter(k => k.length >= 4);
            for (const keyword of keywords) {
                if (normalizedText.includes(keyword)) {
                    return true;
                }
            }

            return false;
        }

        function checkBooks() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');
            const statsDiv = document.getElementById('stats');

            if (!inputText.trim()) {
                resultDiv.innerHTML = '<div class="no-result">请输入要核验的内容</div>';
                statsDiv.style.display = 'none';
                return;
            }

            // 提取可能的书名（按换行、逗号、分号等分隔）
            const lines = inputText.split(/[\n\r,，;；、.。!！?？]+/).map(s => s.trim()).filter(s => s.length >= 2);

            // 去重
            const uniqueTexts = [...new Set(lines)];

            let passCount = 0;
            let failCount = 0;
            const results = [];

            for (const text of uniqueTexts) {
                let found = false;
                let matchedBook = '';

                for (const book of books) {
                    if (fuzzyMatch(text, book)) {
                        found = true;
                        matchedBook = book;
                        break;
                    }
                }

                if (found) {
                    passCount++;
                    results.push({ text, matchedBook, pass: true });
                } else {
                    failCount++;
                    results.push({ text, matchedBook, pass: false });
                }
            }

            // 显示统计
            document.getElementById('passCount').textContent = passCount;
            document.getElementById('failCount').textContent = failCount;
            statsDiv.style.display = 'flex';

            // 显示结果
            resultDiv.innerHTML = results.map(r => `
                <div class="result-item ${r.pass ? 'pass' : 'fail'}">
                    <span class="icon">${r.pass ? '✓' : '✗'}</span>
                    <span class="book-name">${r.text}</span>
                    ${r.pass && r.matchedBook ? `<span class="source">匹配: ${r.matchedBook}</span>` : ''}
                </div>
            `).join('');
        }
    </script>

</html>
